<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordsearch Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Language Wordsearch</h1>
        <div class="input-section">
            <div id="language-window" class="setup-window">
                <p>Select the language pair first.</p>
                <div class="language-selection">
                    <div class="column">
                        <h4>Grid Language:</h4>
                        <label><input type="radio" name="grid-lang" value="es" checked> Spanish</label>
                        <label><input type="radio" name="grid-lang" value="fr"> French</label>
                        <label><input type="radio" name="grid-lang" value="en"> English</label>
                        <label><input type="radio" name="grid-lang" value="kw"> Cornish</label>
                        <label><input type="radio" name="grid-lang" value="br"> Breton</label>
                    </div>
                    <div class="column">
                        <h4>Word List Language:</h4>
                        <label><input type="radio" name="list-lang" value="es"> Spanish</label>
                        <label><input type="radio" name="list-lang" value="fr"> French</label>
                        <label><input type="radio" name="list-lang" value="en"> English</label>
                        <label><input type="radio" name="list-lang" value="kw"> Cornish</label>
                        <label><input type="radio" name="list-lang" value="br"> Breton</label>
                    </div>
                </div>
                <div class="button-section">
                    <button id="to-theme-btn" type="button">Continue to Theme</button>
                </div>
            </div>

            <div id="theme-window" class="setup-window" hidden>
                <p>Select a theme for this language pair.</p>
                <div class="theme-selection">
                    <h4>Theme:</h4>
                    <label for="theme-select">Choose a theme:</label>
                    <select id="theme-select">
                        <option value="">Select a theme</option>
                    </select>
                </div>
                <div class="button-section theme-buttons">
                    <button id="back-to-language-btn" type="button">Back to Language Pair</button>
                    <button id="generate-btn" type="button">Load Wordsearch</button>
                </div>
            </div>

            <p id="direction-note" style="font-size:0.95em; color:#555;">Select a language pair, then continue to choose a theme.</p>
        </div>
        <div class="wordsearch-actions">
            <button id="back-to-selection" type="button" hidden>Back to Theme Selection</button>
            <button id="show-translations-btn" type="button" hidden>Hold for Translations</button>
        </div>
        <div class="wordsearch-section">
            <div id="grid"></div>
            <div id="word-list"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
