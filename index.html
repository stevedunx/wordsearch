<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordsearch Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Language Wordsearch</h1>
        <div class="input-section">
            <p>Select a theme and languages, then find the word list language words in the grid.</p>
            <div class="theme-selection">
                <h4>Theme:</h4>
                <label><input type="radio" name="theme" value="food" checked> Food</label>
                <label><input type="radio" name="theme" value="family"> Family Members</label>
            </div>
            <div class="language-selection">
                <div class="column">
                    <h4>Grid Language:</h4>
                    <label><input type="radio" name="grid-lang" value="es" checked> Spanish</label>
                    <label><input type="radio" name="grid-lang" value="fr"> French</label>
                    <label><input type="radio" name="grid-lang" value="en"> English</label>
                    <label><input type="radio" name="grid-lang" value="kw"> Cornish</label>
                </div>
                <div class="column">
                    <h4>Word List Language:</h4>
                    <label><input type="radio" name="list-lang" value="es"> Spanish</label>
                    <label><input type="radio" name="list-lang" value="fr"> French</label>
                    <label><input type="radio" name="list-lang" value="en"> English</label>
                    <label><input type="radio" name="list-lang" value="kw"> Cornish</label>
                </div>
            </div>
            <div class="button-section">
                <button id="generate-btn">Load Wordsearch</button>
            </div>
            <p id="direction-note" style="font-size:0.95em; color:#555;">Select theme and languages, then click "Load Wordsearch".</p>
        </div>
        <div class="wordsearch-section">
            <div id="grid"></div>
            <div id="word-list"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
